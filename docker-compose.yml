services:
  # ─── POSTGRES (сонголт — зөвхөн local; Neon ашиглах бол энэ profile асаахгүй) ─
  postgres:
    profiles: ["local-postgres"]
    image: postgres:16-alpine
    container_name: elearn-blue-postgres
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: elearn
      POSTGRES_PASSWORD: elearn_password
      POSTGRES_DB: elearn_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elearn -d elearn_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── REDIS ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: elearn-blue-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── WEB APP ──────────────────────────────────────────────────────────
  # DATABASE_URL / DIRECT_URL: .env (Neon) эсвэл орчны хувьсагч. Local Postgres → profile local-postgres.
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elearn-blue-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Neon pooled connection string}
      DIRECT_URL: ${DIRECT_URL:-${DATABASE_URL}}
      REDIS_URL: "redis://redis:6379"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      AUTH_SECRET: "${AUTH_SECRET:-${NEXTAUTH_SECRET}}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-http://localhost:3000}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
    command: sh -c "npx prisma migrate deploy && node server.js"

  # ─── WORKER ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: elearn-blue-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Neon pooled connection string}
      DIRECT_URL: ${DIRECT_URL:-${DATABASE_URL}}
      REDIS_URL: "redis://redis:6379"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"

  # ─── NGINX (reverse proxy + SSL) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: elearn-blue-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    profiles: ["production"]

volumes:
  postgres_data:
  redis_data:
